<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hub cuantificador de obra civil</title>
  <style>
    :root {
      --color-background-primary:   #ffffff;
      --color-background-secondary: #f6f8f7;
      --color-background-tertiary:  #ebeeed;
      --color-border-secondary:     #d5dad8;
      --color-border-tertiary:      #e5e8e7;
      --color-text-primary:         #1a1d1c;
      --color-text-secondary:       #586360;
      --color-text-tertiary:        #8b918e;
      --border-radius-md: 7px;
      --border-radius-lg: 12px;
    }
    body {
      margin: 0;
      padding: 24px;
      background: #fbfcfc;
      color: var(--color-text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
    }
    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; }
    #app-loading { color: var(--color-text-tertiary); font-size: 13px; }
  </style>
</head>
<body>
  <div id="app"><span id="app-loading">Cargando Hub cuantificador…</span></div>
  <script>
    // Carga el módulo de la app (fragmento) y lo inyecta, re-ejecutando sus scripts.
    fetch('hub_cimentacion_v1.html')
      .then(r => r.text())
      .then(html => {
        const app = document.getElementById('app');
        app.innerHTML = html;
        // innerHTML no ejecuta <script>: los recreamos para que corran.
        app.querySelectorAll('script').forEach(old => {
          const s = document.createElement('script');
          s.textContent = old.textContent;
          document.body.appendChild(s);
          old.remove();
        });
      })
      .catch(err => {
        document.getElementById('app').innerHTML =
          '<p style="color:#b00">No se pudo cargar la app: ' + err + '</p>';
      });
  </script>
</body>
</html>
